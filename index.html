<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger House</title>

    <link rel="shortcut icon" href="./assets/icons/Chanese 1.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/responsive.css">

    <script src="./script.js"></script>
    <script src="./scripts/templates.js"></script>
    <script src="./scripts/foods.js"></script>
</head>

<body onload="init()">
    <header>
        <section class="header">
            <div class="logo-btn max-width">
                <img class="logo" src="./assets/icons/Logo 02.png" alt="">
                <button class="hide button" id="burger_menu_btn" class="menu-btn">
                    <img src="./assets/icons/menu.png" alt="Menü Logo mit 3 Streifen">
                </button>
            </div>
        </section>
        <div class="header-image">
            <img class="big-img" src="./assets/img/9368f6ab61c8df3bac59f014cab9c6aa8df459ec.webp"
                alt="Ein Teller mit einer Pizza">
            <img class="header-icon" src="./assets/icons/5045650232394c82bc6d0c922b2ea0aaace7e71d.png" alt="Ein Hamburger">
        </div>

    </header>
    <main>
        <dialog class="order-confirmed" tabindex="0" id="confirm_dialog">

        </dialog>

        <section class="headline">
            <div class="gap">
                <div class="display">
                    <h1 class="color">Burger</h1>
                    <h1>House</h1>
                </div>
                <div class="background">
                    <img class="star" src="./assets/icons/star.png" alt="Stern">
                    <span style="font-size: 20px;">4,1</span>
                    <span style="font-size: 18px; color: rgba(114, 109, 109, 1); font-family: 'palanquin';">(317)</span>
                </div>
            </div>
            <p class="underline">The best of Burgers, Pizza and Greens, all in one great place.</p>
        </section>

        <section class="menu">
            <div class="menu-bg padding-left max-width">
                <img class="menu-icon" src="./assets/icons/Chanese 1.png" alt="kleiner Symbol eines Burgers">
                <h2 class="menu-headline">Burger</h2>
            </div>
        </section>
        <section class="padding-left">
            <div id="burger_menu" class="max-width">

            </div>
        </section>

        <section class="menu">
            <div class="menu-bg padding-left max-width">
                <img class="menu-icon" src="./assets/icons/Pizza 1.png" alt="kleines Symbol einer Pizza">
                <h2 class="menu-headline">Pizza <span class="menu-underline">(30cm)</span></h2>
            </div>
        </section>
        <section class="padding-left">
            <div id="pizza_menu" class="max-width">

            </div>
        </section>

        <section class="menu">
            <div class="menu-bg padding-left max-width">
                <img class="menu-icon" src="./assets/icons/Salad 1.png" alt="kleines Symbol von einem Salad">
                <h2 class="menu-headline">Salad</h2>
            </div>
        </section>
        <section class="padding-left">
            <div id="salad_menu" class="max-width">

            </div>
        </section>

        <section id="responsive_basket" class="basket-layout hide">
            <h3 class="basket-headline">Your Basket</h3>
            <div id="basket" class="column">

            </div>
            <div class="mobile-basket-price" id="total_price">

            </div>
        </section>
    </main>
    <footer>
        <section class="footer-info">
            <div style="display: flex; align-items: center; gap: 2px;">
                <img style="height: 24px; width: 24px;" src="./assets/icons/copyright.png" alt="copyright icon">
                <span class="footer-font">2025 BurgerHouse</span>
            </div>
            <span class="footer-font">Imprint</span>
            <span class="footer-font">Cookie Preference</span>
        </section>
    </footer>
    <section id="responsive_nav_bar" class="position-sticky display-none">

    </section>
</body>

</html>

 <!--Basket begrenzen auf 1920px breite! -->
 <!--Im Basket die Items multiplizieren und den Preis anpassen! Tipp: Check In-->
 <!--Nav Bar nicht immer neu rendern! Nur der Amount darf sich erhöhen.  -->
