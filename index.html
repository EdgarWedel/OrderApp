<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizza Land</title>

    <link rel="shortcut icon" href="./assets/icons/Property 1=default.png" type="image/x-icon">
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./styles/standard.css">

    <script src="./script.js"></script>
    <script src="./scripts/templates.js"></script>
</head>

<body>
    <header>
        <section class="header">
            <div class="logo-btn">
                <img class="logo" src="./assets/icons/Logo 02.png" alt="">
                <button class="menu-btn">
                    <img src="./assets/icons/menu.png" alt="Logo eines Menü's mit 3 Strichen">
                </button>
            </div>
        </section>
        <div class="header-image">
            <img class="big-img" src="./assets/img/9368f6ab61c8df3bac59f014cab9c6aa8df459ec.jpg" alt="Ein Teller mit einer Pizza">
            <img class="burger-icon" src="./assets/icons/5045650232394c82bc6d0c922b2ea0aaace7e71d.png" alt="">
        </div>
        
    </header>
    <main>
        <section class="headline">
            <div class="gap">
                <div class="display">
                    <h1 class="color">Burger</h1><h1>House</h1>
                </div>
                <div class="background">
                    <img class="star" src="./assets/icons/star.png" alt="Stern">
                    <span style="font-size: 20px; font-weight: bold;">4,1</span><span style="font-size: 18px; color: rgba(114, 109, 109, 1);">(317)</span>
                </div>
            </div>
            <p class="underline">The best of Burgers, Pizza and Greens, all in one great place.</p>
        </section>
        <section class="menu">
            <div class="burger-headline">
                <img src="./assets/icons/Chanese 1.png" alt="">
                <div class="background-color">
                    <h2>Burger & Sandwiches</h2>
                </div>
            </div>
        </section>
    </main>
    <footer>

    </footer>
</body>

</html>
